name: Verify Program

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'Cargo.lock'

concurrency:
  group: verify
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-and-verify:
    name: Generate Cargo.lock and Verify Program
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install solana-verify
        run: |
          curl -L https://github.com/solana-foundation/solana-verifiable-build/releases/download/v0.4.15/solana-verify-0.4.15-linux -o solana-verify
          chmod +x solana-verify
          sudo mv solana-verify /usr/local/bin/solana-verify
          solana-verify --version

      - name: Generate and fix Cargo.lock inside Solana verifiable build Docker image
        run: |
          DOCKER_IMAGE="solanafoundation/solana-verifiable-build@sha256:3ebe83c9a9e54b73fc2ef3b15bf4f634b8bf702f9d28366a74ff4f873f21f721"
          docker pull "$DOCKER_IMAGE"

          # Step 1: Generate initial lockfile with Cargo 1.84.0 inside the Solana build image
          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            "$DOCKER_IMAGE" \
            cargo generate-lockfile
          echo "=== Initial Cargo.lock generated ==="

          # Step 2: proc-macro-crate 3.5.0 → 3.3.0
          # 3.5.0 → toml_edit 0.25.x → toml_parser 1.1.x (edition2024, requires rustc 1.85)
          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            "$DOCKER_IMAGE" \
            cargo update --precise 3.3.0 "proc-macro-crate@3.5.0"
          echo "=== proc-macro-crate → 3.3.0 ==="

          # Step 3: blake3 → 1.5.5
          # blake3 >= 1.6.0 → digest 0.11.x → block-buffer 0.12.0 (edition2024)
          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            "$DOCKER_IMAGE" \
            cargo update --precise 1.5.5 blake3
          echo "=== blake3 → 1.5.5 ==="

          # Step 4: indexmap → 2.7.1 (latest as of Jan 2025, before program was built)
          # indexmap 2.10+ → hashbrown 0.17.x (edition2024)
          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            "$DOCKER_IMAGE" \
            cargo update --precise 2.7.1 indexmap
          echo "=== indexmap → 2.7.1 ==="

          # Step 5: unicode-segmentation → 1.12.0 (requires rustc 1.85 in 1.13.x)
          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            "$DOCKER_IMAGE" \
            cargo update --precise 1.12.0 unicode-segmentation
          echo "=== unicode-segmentation → 1.12.0 ==="

          # Step 6: solana-zk-sdk → 2.2.0 (released Feb 15, 2025, same day as Solana 2.3.0)
          # MUST be done BEFORE solana-zk-token-sdk so Cargo cascades solana-pubkey to =2.2.1.
          # 2.3.x versions (released Jun 2025+) require solana-pubkey ^2.4.0 which conflicts
          # with solana-zk-token-sdk 2.2.0 (requires solana-pubkey =2.2.1).
          # spl-token-2022 6.0.0 requires solana-zk-sdk ^2.1.0 → 2.2.0 satisfies this.
          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            "$DOCKER_IMAGE" \
            cargo update --precise 2.2.0 solana-zk-sdk
          echo "=== solana-zk-sdk → 2.2.0 (cascades solana-pubkey to 2.2.1) ==="

          # Step 7: solana-zk-token-sdk → 2.2.0 (released Feb 15, 2025)
          # 2.3.x has a bug: COMMITMENT_MAX_FEE_BASIS_POINTS static is not gated with
          # #[cfg(not(target_os = "solana"))], but uses PedersenCommitment/Pedersen types
          # that are only imported in that cfg block — fails to compile for SBF target.
          # 2.2.0 uses lazy_static! with proper cfg gating (compiles fine).
          # spl-pod 0.3.1 requires solana-zk-token-sdk ^2.0.3 → 2.2.0 satisfies this.
          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            "$DOCKER_IMAGE" \
            cargo update --precise 2.2.0 solana-zk-token-sdk
          echo "=== solana-zk-token-sdk → 2.2.0 ==="

          echo "=== Final Cargo.lock summary ==="
          grep -E "^name|^version" Cargo.lock | grep -A1 "solana-zk" | head -20

      - name: Commit and push Cargo.lock
        run: |
          git config user.name "signitoprivacy"
          git config user.email "283565983+signitoprivacy@users.noreply.github.com"
          git add Cargo.lock
          if git diff --staged --quiet; then
            echo "Cargo.lock unchanged, skipping commit"
          else
            git commit -m "Update Cargo.lock for reproducible verification"
            git pull --rebase
            git push
            echo "Cargo.lock committed and pushed"
          fi

      - name: Verify Program from repo
        run: |
          solana-verify verify-from-repo \
            --url https://api.mainnet-beta.solana.com \
            --program-id CZBvErdLT8HL2iJS9NrRn7PhdeFWKNcMmvweEPsSbAAX \
            --skip-prompt \
            https://github.com/signitoprivacy/signito-vault
