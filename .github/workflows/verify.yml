name: Verify Program

on:
  push:
    branches: [main]
    paths:
      - 'signito-vault/src/**'
      - 'signito-vault/Cargo.toml'
      - 'Cargo.lock'
      - 'Anchor.toml'
  workflow_dispatch:
    inputs:
      program_id:
        description: 'Program ID to verify'
        required: false
        default: 'CZBvErdLT8HL2iJS9NrRn7PhdeFWKNcMmvweEPsSbAAX'

jobs:
  verify:
    name: Submit OtterSec Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger OtterSec remote verification
        run: |
          PROGRAM_ID="${{ github.event.inputs.program_id || 'CZBvErdLT8HL2iJS9NrRn7PhdeFWKNcMmvweEPsSbAAX' }}"
          COMMIT="${{ github.sha }}"
          echo "Submitting verification for $PROGRAM_ID at $COMMIT"
          curl -sf -X POST https://verify.osec.io/verify \
            -H "Content-Type: application/json" \
            -d "{"repo": "https://github.com/signitoprivacy/signito-vault", "program_id": "$PROGRAM_ID", "commit": "$COMMIT"}" \
            | tee verify_response.json || true
          cat verify_response.json

      - name: Check verification status
        run: |
          sleep 30
          curl -sf "https://verify.osec.io/status/CZBvErdLT8HL2iJS9NrRn7PhdeFWKNcMmvweEPsSbAAX" | python3 -m json.tool
