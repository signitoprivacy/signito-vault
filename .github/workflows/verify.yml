name: Verify Program

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'Cargo.lock'

concurrency:
  group: verify
  cancel-in-progress: false

jobs:
  build-and-verify:
    name: Verify Program on Mainnet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install solana-verify
        run: |
          curl -L https://github.com/solana-foundation/solana-verifiable-build/releases/download/v0.4.15/solana-verify-0.4.15-linux -o solana-verify
          chmod +x solana-verify
          sudo mv solana-verify /usr/local/bin/solana-verify
          solana-verify --version

      - name: Write keypair for registry upload
        env:
          SOLANA_DEPLOYER_KEYPAIR: ${{ secrets.SOLANA_DEPLOYER_KEYPAIR }}
        run: |
          echo "$SOLANA_DEPLOYER_KEYPAIR" > /tmp/deployer-keypair.json
          chmod 600 /tmp/deployer-keypair.json

      - name: Verify Program from repo
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          solana-verify verify-from-repo \
            --url "https://mainnet.helius-rpc.com/?api-key=${HELIUS_API_KEY}" \
            --program-id CZBvErdLT8HL2iJS9NrRn7PhdeFWKNcMmvweEPsSbAAX \
            --library-name signito_vault \
            --base-image solanafoundation/solana-verifiable-build:3.1.14 \
            --skip-prompt \
            --keypair /tmp/deployer-keypair.json \
            https://github.com/signitoprivacy/signito-vault
