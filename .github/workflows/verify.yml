name: Build and Verify Program

on:
  push:
    branches: [main]
    paths:
      - 'signito-vault/src/**'
      - 'signito-vault/Cargo.toml'
      - 'Cargo.lock'
      - 'Anchor.toml'
  workflow_dispatch:
    inputs:
      build_commit:
        description: 'Specific commit SHA to build from (default: current HEAD)'
        required: false
        default: ''

jobs:
  build:
    name: Verifiable Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.build_commit || github.sha }}
          fetch-depth: 0

      - name: Show build info
        run: |
          echo "Building commit: $(git rev-parse HEAD)"
          git log -1 --oneline
          echo "Cargo.lock checksum: $(sha256sum Cargo.lock | cut -c1-16)"

      - name: Install solana-verify
        run: cargo install solana-verify --locked

      - name: Build with solana-verify using correct image tag (2.2.1 not v2.2.1)
        run: |
          solana-verify build --library-name signito_vault \
            --base-image solanafoundation/solana-verifiable-build:2.2.1

      - name: Get executable hash
        id: hash
        run: |
          HASH=$(solana-verify get-executable-hash target/deploy/signito_vault.so)
          echo "executable_hash=$HASH" >> $GITHUB_OUTPUT
          echo "Built binary hash: $HASH"

      - name: Upload built binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signito_vault_verifiable
          path: target/deploy/signito_vault.so
          retention-days: 7

      - name: Summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "- Image: solanafoundation/solana-verifiable-build:2.2.1" >> $GITHUB_STEP_SUMMARY
          echo "- Executable hash: ${{ steps.hash.outputs.executable_hash }}" >> $GITHUB_STEP_SUMMARY
